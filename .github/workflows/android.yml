name: Android CI/CD

on:
  push:
    branches: [ master, dev ]
    tags: [ 'v*' ]
    paths-ignore:
      - ".editorconfig"
      - "fastlane/*"
      - "release/*"
      - "work/*"
      - "LICENSE"
      - "README.md"
  pull_request:
    branches: [ master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/geometricweather.jks

      - name: Build Debug APK
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))
        run: ./gradlew assembleFdroidDebug --no-daemon

      - name: Build Release APKs
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          ./gradlew assembleFdroidRelease --no-daemon
          ./gradlew assembleGplayRelease --no-daemon
          ./gradlew assemblePubRelease --no-daemon

      - name: Upload Debug APK
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: GeometricWeather-fdroid-debug
          path: app/build/outputs/apk/fdroid/debug/*.apk

      - name: Upload Release APKs
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: GeometricWeather-release-apks
          path: |
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/apk/gplay/release/*.apk
            app/build/outputs/apk/pub/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/apk/gplay/release/*.apk
            app/build/outputs/apk/pub/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
